# ---- MYSQL DATABASE ----
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db
# Connects to MySQL DB running on localhost (port 3306)

spring.datasource.username=root
# Your MySQL username

spring.datasource.password=Mahesh@4001
# Your MySQL password

spring.jpa.hibernate.ddl-auto=update
# Auto creates/updates tables based on entities

spring.jpa.show-sql=true
# Prints SQL queries in console

spring.jpa.properties.hibernate.format_sql=true
# Formats SQL output

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Tells Hibernate to generate MySQL-compatible SQL