# API Gateway Configuration
spring.application.name=api-gateway
server.port=8083

# Eureka Configuration - Register with Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Spring Cloud Gateway Configuration with Eureka (Service Discovery)
# Dynamic routing enabled - uses service names from Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Configure routes using service names from Eureka
# Format: http://localhost:8083/{service-name}/** will route to the registered service

# Alternative: Explicit routes (uncomment to use static routes)
# Note: With discovery.locator.enabled=true, dynamic routes work automatically

# Product Service Route
#spring.cloud.gateway.routes[0].id=product-service
#spring.cloud.gateway.routes[0].uri=lb://product-service
#spring.cloud.gateway.routes[0].predicates[0]=Path=/product/**

# User Service Route
#spring.cloud.gateway.routes[1].id=user-service
#spring.cloud.gateway.routes[1].uri=lb://user-service
#spring.cloud.gateway.routes[1].predicates[0]=Path=/user/**

# Order Service Route
#spring.cloud.gateway.routes[2].id=order-service
#spring.cloud.gateway.routes[2].uri=lb://order-service
#spring.cloud.gateway.routes[2].predicates[0]=Path=/order/**

# Actuator endpoints for health check
management.endpoints.web.exposure.include=health,gateway
management.endpoint.health.show-details=always

# Logging configuration
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.ecommerce.gateway=DEBUG
